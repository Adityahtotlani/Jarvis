<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S.</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --c:   #00d4ff;   /* primary cyan */
    --c2:  #0066cc;   /* mid blue */
    --c3:  #003366;   /* dark blue */
    --bg:  #030810;   /* near-black */
    --bg2: #070f1a;   /* panel bg */
    --bg3: #0a1520;   /* slightly lighter */
    --warn:#ffaa00;
    --err: #ff3333;
    --ok:  #00ff88;
    --text:#b0e4f0;
    --dim: #2a4a5a;
    --r:   6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', 'Consolas', monospace;
    font-size: 13px;
    height: 100vh;
    display: grid;
    grid-template-rows: 54px 1fr 70px;
    grid-template-columns: 260px 1fr 230px;
    gap: 6px;
    padding: 6px;
    overflow: hidden;
  }

  /* ── Scanline overlay ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,212,255,.018) 2px,
      rgba(0,212,255,.018) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Shared panel ── */
  .panel {
    background: var(--bg2);
    border: 1px solid var(--c3);
    border-radius: var(--r);
    padding: 10px 12px;
    position: relative;
    overflow: hidden;
  }
  .panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top left, rgba(0,100,200,.06), transparent 60%);
    pointer-events: none;
  }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: var(--bg2);
    border: 1px solid var(--c3);
    border-radius: var(--r);
  }

  .logo {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 6px;
    color: var(--c);
    text-shadow: 0 0 12px rgba(0,212,255,.6);
  }
  .logo span { color: var(--c2); font-size: 11px; letter-spacing: 2px; display: block; margin-top: -4px; }

  .status-pills { display: flex; gap: 8px; align-items: center; }
  .pill {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    border: 1px solid var(--dim);
    color: var(--dim);
    transition: all .3s;
    letter-spacing: 1px;
  }
  .pill.on { border-color: var(--c); color: var(--c); text-shadow: 0 0 6px var(--c); }
  .pill.warn { border-color: var(--warn); color: var(--warn); }

  .conn-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--err);
    box-shadow: 0 0 6px var(--err);
    transition: background .3s, box-shadow .3s;
  }
  .conn-dot.online { background: var(--ok); box-shadow: 0 0 8px var(--ok); }

  /* ── Left panel: metrics ── */
  .metrics { grid-row: 2; overflow-y: auto; }

  .section-title {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--c2);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--c3);
  }

  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .metric-label { color: var(--dim); font-size: 11px; letter-spacing: 1px; }
  .metric-val   { color: var(--c); font-size: 12px; font-weight: bold; }
  .metric-val.warn { color: var(--warn); }
  .metric-val.crit { color: var(--err); }

  .bar-track {
    height: 4px;
    background: var(--c3);
    border-radius: 2px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--c2), var(--c));
    box-shadow: 0 0 6px var(--c);
    transition: width .5s ease;
  }
  .bar-fill.warn { background: linear-gradient(90deg, #995500, var(--warn)); box-shadow: 0 0 6px var(--warn); }
  .bar-fill.crit { background: linear-gradient(90deg, #660000, var(--err)); box-shadow: 0 0 6px var(--err); }

  .chart-wrap { margin-top: 12px; height: 90px; }

  /* ── Centre: conversation ── */
  .chat {
    grid-row: 2;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding-right: 4px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--c3); border-radius: 2px; }

  .msg { margin-bottom: 14px; animation: fadeIn .25s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

  .msg-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .msg.user  .msg-label { color: var(--ok); }
  .msg.jarvis .msg-label { color: var(--c); }

  .msg-body {
    padding: 8px 12px;
    border-radius: var(--r);
    line-height: 1.55;
    font-size: 13px;
    border-left: 2px solid transparent;
  }
  .msg.user  .msg-body { background: var(--bg3); border-left-color: var(--ok); color: #d0f0d0; }
  .msg.jarvis .msg-body { background: var(--bg3); border-left-color: var(--c); color: var(--text); }

  /* streaming cursor */
  .cursor::after {
    content: '▋';
    animation: blink .6s step-end infinite;
    color: var(--c);
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Right panel ── */
  .sidebar { grid-row: 2; overflow-y: auto; }

  .rem-item, .fact-item {
    padding: 6px 8px;
    margin-bottom: 6px;
    background: var(--bg3);
    border-radius: 4px;
    border-left: 2px solid var(--c2);
    font-size: 12px;
    line-height: 1.4;
    animation: fadeIn .3s ease;
  }
  .rem-item { border-left-color: var(--warn); color: #ffe0a0; }
  .fact-item { border-left-color: var(--c2); color: var(--text); }
  .empty-note { color: var(--dim); font-size: 11px; font-style: italic; }

  /* ── Footer input ── */
  footer {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 10px;
    background: var(--bg2);
    border: 1px solid var(--c3);
    border-radius: var(--r);
  }

  #prompt {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--c);
    font-family: inherit;
    font-size: 14px;
    letter-spacing: .5px;
    caret-color: var(--c);
  }
  #prompt::placeholder { color: var(--dim); }

  .send-btn {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--c);
    border-radius: 4px;
    color: var(--c);
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all .2s;
  }
  .send-btn:hover { background: var(--c); color: var(--bg); }
  .send-btn:disabled { opacity: .35; cursor: default; }

  .prompt-label { color: var(--c2); letter-spacing: 1px; }

  /* ── Utility ── */
  .sep { margin: 12px 0; border: none; border-top: 1px solid var(--c3); }
</style>
</head>

<body>

<!-- ══ HEADER ══════════════════════════════════════════════════════════ -->
<header>
  <div>
    <div class="logo">J.A.R.V.I.S.</div>
    <span style="color:var(--dim);font-size:10px;letter-spacing:3px;">JUST A RATHER VERY INTELLIGENT SYSTEM</span>
  </div>
  <div class="status-pills">
    <div class="pill on" id="pill-llm">LLM</div>
    <div class="pill on" id="pill-mem">MEMORY</div>
    <div class="pill on" id="pill-tts">TTS</div>
    <div class="pill" id="pill-voice">VOICE</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span style="font-size:11px;color:var(--dim);letter-spacing:1px;" id="conn-label">OFFLINE</span>
    <div class="conn-dot" id="conn-dot"></div>
  </div>
</header>

<!-- ══ LEFT: METRICS ═══════════════════════════════════════════════════ -->
<div class="panel metrics">
  <div class="section-title">System Status</div>

  <div class="metric-row">
    <span class="metric-label">CPU</span>
    <span class="metric-val" id="cpu-val">—</span>
  </div>
  <div class="bar-track"><div class="bar-fill" id="cpu-bar" style="width:0%"></div></div>

  <div class="metric-row">
    <span class="metric-label">RAM</span>
    <span class="metric-val" id="ram-val">—</span>
  </div>
  <div class="bar-track"><div class="bar-fill" id="ram-bar" style="width:0%"></div></div>

  <div class="metric-row">
    <span class="metric-label">DISK</span>
    <span class="metric-val" id="disk-val">—</span>
  </div>
  <div class="bar-track"><div class="bar-fill" id="disk-bar" style="width:0%"></div></div>

  <div class="metric-row">
    <span class="metric-label">BATTERY</span>
    <span class="metric-val" id="bat-val">—</span>
  </div>
  <div class="bar-track"><div class="bar-fill" id="bat-bar" style="width:0%"></div></div>

  <div class="section-title" style="margin-top:14px;">CPU History</div>
  <div class="chart-wrap">
    <canvas id="cpu-chart"></canvas>
  </div>
</div>

<!-- ══ CENTRE: CHAT ════════════════════════════════════════════════════ -->
<div class="panel chat">
  <div class="section-title">Conversation</div>
  <div id="messages"></div>
</div>

<!-- ══ RIGHT: SIDEBAR ══════════════════════════════════════════════════ -->
<div class="panel sidebar">
  <div class="section-title">Reminders</div>
  <div id="reminders-list"><p class="empty-note">No active reminders.</p></div>

  <hr class="sep">

  <div class="section-title">Stored Facts</div>
  <div id="facts-list"><p class="empty-note">No facts stored yet.</p></div>
</div>

<!-- ══ FOOTER: INPUT ═══════════════════════════════════════════════════ -->
<footer>
  <span class="prompt-label">&gt;</span>
  <input id="prompt" type="text" placeholder="Issue a command, sir…" autocomplete="off" spellcheck="false">
  <button class="send-btn" id="send-btn">Send</button>
</footer>

<script>
// ── Socket connection ──────────────────────────────────────────────────
const socket = io();
const dot    = document.getElementById('conn-dot');
const label  = document.getElementById('conn-label');

socket.on('connect', () => {
  dot.classList.add('online');
  label.textContent = 'ONLINE';
  loadFacts();
});
socket.on('disconnect', () => {
  dot.classList.remove('online');
  label.textContent = 'OFFLINE';
});

// ── Conversation ───────────────────────────────────────────────────────
const feed   = document.getElementById('messages');
let   jarvisDiv = null;

function appendMsg(role, text) {
  const wrap  = document.createElement('div');
  wrap.className = `msg ${role}`;
  const lbl   = document.createElement('div');
  lbl.className  = 'msg-label';
  lbl.textContent = role === 'user' ? 'You' : 'J.A.R.V.I.S.';
  const body  = document.createElement('div');
  body.className  = 'msg-body';
  body.textContent = text;
  wrap.appendChild(lbl);
  wrap.appendChild(body);
  feed.appendChild(wrap);
  feed.scrollTop = feed.scrollHeight;
  return body;
}

// Load history on connect
socket.on('history', turns => {
  feed.innerHTML = '';
  turns.forEach(t => appendMsg(t.role === 'user' ? 'user' : 'jarvis', t.content));
});

socket.on('user_message', data => {
  appendMsg('user', data.text);
  // Prepare streaming JARVIS bubble
  const wrap  = document.createElement('div');
  wrap.className = 'msg jarvis';
  const lbl   = document.createElement('div');
  lbl.className  = 'msg-label';
  lbl.textContent = 'J.A.R.V.I.S.';
  const body  = document.createElement('div');
  body.className  = 'msg-body cursor';
  wrap.appendChild(lbl);
  wrap.appendChild(body);
  feed.appendChild(wrap);
  feed.scrollTop = feed.scrollHeight;
  jarvisDiv = body;
});

socket.on('token', data => {
  if (jarvisDiv) {
    jarvisDiv.textContent += data.text;
    feed.scrollTop = feed.scrollHeight;
  }
});

socket.on('response_complete', data => {
  if (jarvisDiv) {
    jarvisDiv.classList.remove('cursor');
    jarvisDiv.textContent = data.text;
    feed.scrollTop = feed.scrollHeight;
    jarvisDiv = null;
  }
  document.getElementById('send-btn').disabled = false;
  document.getElementById('prompt').disabled   = false;
  document.getElementById('prompt').focus();
});

socket.on('reminder_fired', data => {
  appendMsg('jarvis', data.text);
  loadFacts();
});

// ── Send message ───────────────────────────────────────────────────────
function send() {
  const input = document.getElementById('prompt');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('send-btn').disabled = true;
  input.disabled = true;
  socket.emit('message', { text });
}

document.getElementById('send-btn').addEventListener('click', send);
document.getElementById('prompt').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// ── System metrics ─────────────────────────────────────────────────────
function setBar(id, pct) {
  const el = document.getElementById(id);
  el.style.width = pct + '%';
  el.className   = 'bar-fill' + (pct >= 90 ? ' crit' : pct >= 75 ? ' warn' : '');
}
function setVal(id, text, pct) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className   = 'metric-val' + (pct >= 90 ? ' crit' : pct >= 75 ? ' warn' : '');
}

// CPU sparkline chart
const cpuHistory = new Array(30).fill(0);
const cpuChart   = new Chart(document.getElementById('cpu-chart'), {
  type: 'line',
  data: {
    labels: cpuHistory.map(() => ''),
    datasets: [{
      data:            cpuHistory,
      borderColor:     '#00d4ff',
      borderWidth:     1.5,
      pointRadius:     0,
      fill:            true,
      backgroundColor: 'rgba(0,100,200,.15)',
      tension:         0.3,
    }]
  },
  options: {
    animation:   false,
    responsive:  true,
    maintainAspectRatio: false,
    plugins:     { legend: { display: false }, tooltip: { enabled: false } },
    scales: {
      x: { display: false },
      y: { display: false, min: 0, max: 100 },
    }
  }
});

socket.on('metrics', m => {
  if (m.cpu !== undefined) {
    setBar('cpu-bar', m.cpu);
    setVal('cpu-val', m.cpu.toFixed(0) + '%', m.cpu);
    cpuHistory.push(m.cpu); cpuHistory.shift();
    cpuChart.data.datasets[0].data = [...cpuHistory];
    cpuChart.update('none');
  }
  if (m.ram !== undefined) {
    setBar('ram-bar', m.ram);
    const free = m.ram_free_gb ? ` (${m.ram_free_gb} GB free)` : '';
    setVal('ram-val', m.ram.toFixed(0) + '%' + free, m.ram);
  }
  if (m.disk !== undefined) {
    setBar('disk-bar', m.disk);
    setVal('disk-val', m.disk.toFixed(0) + '%', m.disk);
  }
  if (m.battery) {
    const p    = m.battery.percent;
    const icon = m.battery.charging ? ' ⚡' : '';
    setBar('bat-bar', p);
    setVal('bat-val', p + '%' + icon, m.battery.charging ? 0 : p < 20 ? 85 : p < 10 ? 95 : 0);
  }
});

// ── Facts sidebar ──────────────────────────────────────────────────────
function loadFacts() {
  fetch('/api/facts')
    .then(r => r.json())
    .then(data => {
      const el = document.getElementById('facts-list');
      if (!data.facts || data.facts.length === 0) {
        el.innerHTML = '<p class="empty-note">No facts stored yet.</p>';
        return;
      }
      el.innerHTML = data.facts
        .map(f => `<div class="fact-item">${escHtml(f)}</div>`)
        .join('');
    })
    .catch(() => {});
}

// ── Reminder polling ───────────────────────────────────────────────────
function loadReminders() {
  fetch('/api/reminders')
    .then(r => r.json())
    .then(data => {
      const el  = document.getElementById('reminders-list');
      const txt = data.text || '';
      if (txt.includes('No active')) {
        el.innerHTML = '<p class="empty-note">No active reminders.</p>';
        return;
      }
      // Parse "msg in N minutes; msg2 in M minutes"
      const body  = txt.replace(/^Active reminders:\s*/i, '').replace(/\.$/, '');
      const items = body.split(';').map(s => s.trim()).filter(Boolean);
      el.innerHTML = items
        .map(i => `<div class="rem-item">⏰ ${escHtml(i)}</div>`)
        .join('');
    })
    .catch(() => {});
}
setInterval(loadReminders, 5000);
loadReminders();

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Auto-focus input ───────────────────────────────────────────────────
document.getElementById('prompt').focus();
</script>
</body>
</html>
