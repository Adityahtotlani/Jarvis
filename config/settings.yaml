jarvis:
  wake_word: "jarvis"
  hotkey: "<cmd>+<shift>+j"
  voice: "Samantha"        # macOS say -v voice (ignored on Linux)
  speech_rate: 175         # words per minute
  user_name: "sir"         # how J.A.R.V.I.S. addresses the user

whisper:
  wake_model: "tiny"       # fast model for wake-word detection
  command_model: "base"    # higher-quality model for command transcription
  chunk_seconds: 2         # seconds per wake-word audio chunk
  command_silence_threshold: 1.5  # seconds of silence to end a command

ollama:
  model: "llama3.2:1b"     # fast 1B model — swap to llama3 for higher quality
  host: "http://localhost:11434"
  context_turns: 6         # fewer turns = faster inference

audio:
  sample_rate: 16000
  channels: 1

memory:
  db_path: "~/.jarvis/memory.db"
